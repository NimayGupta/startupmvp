name = "discount-optimizer"
# Replace with your actual SHOPIFY_API_KEY from the Partner Dashboard
client_id = "2b9a9808fc58bae75a4c2492e64d262b"
application_url = "https://example.com"
embedded = true

[access_scopes]
# read_orders requires approval for public apps.
# For development stores it is granted automatically.
scopes = "read_products,write_products,read_orders,read_inventory,write_discounts"

[auth]
redirect_urls = [
  "https://example.com/auth/callback"
]

[webhooks]
api_version = "2024-04"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks/inventory_levels/update"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

[pos]
embedded = false
